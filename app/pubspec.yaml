name: mafia_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_core: any
  firebase_auth: any
  firebase_database: any
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.2.1
  go_router: ^14.0.0
  riverpod_annotation: ^2.3.3
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#10002B"
  adaptive_icon_foreground: "assets/icon.png"
